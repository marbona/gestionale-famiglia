# COPIA questo file in secret.yaml e imposta la password corretta
# (deve corrispondere a quella in k8s/postgres/secret.yaml)
# Il file secret.yaml è escluso da git (.gitignore)
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: gestionale
type: Opaque
stringData:
  DATABASE_URL: "postgresql://gestionale:CAMBIA_QUESTA_PASSWORD@postgres:5432/gestionale"

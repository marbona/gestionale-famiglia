apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gestionale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres -p 5432; do echo "Attendo postgres..."; sleep 2; done
      containers:
        - name: backend
          image: ghcr.io/marbona/gestionale-famiglia-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
            - name: AI_CHAT_ENABLED
              value: "true"
            - name: OLLAMA_BASE_URL
              value: "http://192.168.69.51:11434"
            - name: OLLAMA_MODEL
              value: "qwen2.5:7b"
            - name: AI_CHAT_MAX_TURNS
              value: "20"
            - name: AI_CHAT_TIMEOUT_SECONDS
              value: "90"
            - name: AI_CHAT_SESSION_TTL_MINUTES
              value: "120"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
